name: Reconcile Payments

# Optional safety net: reconciles stale pending NOWPayments orders via a secured HTTP endpoint.
# Requires CRON_SECRET in GitHub Actions secrets and on Cloudflare Production.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay under load)
  workflow_dispatch:
    inputs:
      olderThanMinutes:
        description: "Only reconcile orders older than N minutes"
        required: false
        default: "10"

concurrency:
  group: reconcile-payments
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reconciliation endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RECONCILE_URL: ${{ vars.RECONCILE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::notice::CRON_SECRET is not configured — skipping reconciliation (not a deploy failure)."
            exit 0
          fi
          URL="${RECONCILE_URL:-https://drivoraparts.com/api/payments/cryptomus/reconcile}"
          code=$(curl -sS -o /tmp/reconcile.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${URL}")
          echo "HTTP ${code}"
          cat /tmp/reconcile.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::warning::Reconciliation returned HTTP ${code} (site may still be healthy)."
            exit 0
          fi
