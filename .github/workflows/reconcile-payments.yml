name: Reconcile Payments

# Anti-loss safety net: periodically asks the production app to reconcile any
# stale `pending` orders against Cryptomus (recovers missed/delayed webhooks).
# OpenNext's Cloudflare worker exposes only `fetch` (no `scheduled` handler),
# so we drive the cron externally and hit the secured HTTP endpoint instead.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay under load)
  workflow_dispatch:
    inputs:
      olderThanMinutes:
        description: "Only reconcile orders older than N minutes"
        required: false
        default: "10"

concurrency:
  group: reconcile-payments
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reconciliation endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RECONCILE_URL: ${{ vars.RECONCILE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not configured; skipping."
            exit 1
          fi
          URL="${RECONCILE_URL:-https://drivoraparts.com/api/payments/cryptomus/reconcile}"
          code=$(curl -sS -o /tmp/reconcile.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${URL}")
          echo "HTTP ${code}"
          cat /tmp/reconcile.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Reconciliation failed with HTTP ${code}"
            exit 1
          fi
