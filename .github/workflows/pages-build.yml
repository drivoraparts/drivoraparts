name: Deploy OpenNext Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-worker
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: OpenNext Cloudflare Worker (production)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Pre-build verification
        run: npm run verify:cloudflare

      - name: Build for Cloudflare (OpenNext)
        run: npm run pages:build

      - uses: actions/upload-artifact@v4
        with:
          name: open-next-build
          path: .open-next
          retention-days: 7

      - name: Deploy Worker to Cloudflare
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm run pages:deploy
