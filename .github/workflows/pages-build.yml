name: Pages Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: OpenNext Cloudflare (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Pre-build verification
        run: npm run verify:cloudflare

      - name: Build for Cloudflare (OpenNext)
        run: npm run pages:build

      - uses: actions/upload-artifact@v4
        with:
          name: open-next-build
          path: .open-next
          retention-days: 7

      - name: Deploy to Cloudflare
        if: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run pages:deploy
