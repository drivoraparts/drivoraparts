name: Pages Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: OpenNext Cloudflare build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare (OpenNext)
        run: npm run pages:build

      - name: Verify OpenNext output
        run: |
          test -f .open-next/worker.js
          test -d .open-next/assets
          echo "OpenNext build output ready"

      - uses: actions/upload-artifact@v4
        with:
          name: pages-build-opennext
          path: .open-next

      - name: Deploy to Cloudflare (OpenNext Worker)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx opennextjs-cloudflare deploy
